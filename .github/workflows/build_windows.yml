name: Build Aseprite Windows

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Aseprite (Windows)
    runs-on: windows-latest
    steps:
      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Skia
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-m124

      - name: Download Skia
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
          unzip skia.zip -d skia

      - name: Get latest Aseprite source
        shell: bash
        run: |
          DOWNLOAD_URL=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest | jq -r '.assets[0].browser_download_url')
          curl -L -o aseprite-source.zip "$DOWNLOAD_URL"
          unzip aseprite-source.zip -d aseprite_src
          # The zip extracts to a subdirectory, find it
          ASEPRITE_DIR=$(ls -d aseprite_src/*/ 2>/dev/null | head -1)
          if [ -z "$ASEPRITE_DIR" ]; then
            ASEPRITE_DIR="aseprite_src"
          fi
          echo "ASEPRITE_DIR=$ASEPRITE_DIR" >> $GITHUB_ENV

      - name: Run CMake
        shell: pwsh
        run: |
          $skiaDir = (Resolve-Path skia).Path
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo `
                -DLAF_BACKEND=skia `
                -DSKIA_DIR="$skiaDir" `
                -DSKIA_LIBRARY_DIR="$skiaDir\out\Release-x64" `
                -DSKIA_LIBRARY="$skiaDir\out\Release-x64\skia.lib" `
                -G Ninja `
                -S $env:ASEPRITE_DIR `
                -B build

      - name: Build
        run: ninja aseprite -C build

      - name: Package
        shell: bash
        run: |
          cd build/bin
          echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini
          7z -tzip a Aseprite-Windows-x64.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows-x64
          path: build/bin/Aseprite-Windows-x64.zip
